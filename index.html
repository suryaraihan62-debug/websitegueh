<!DOCTYPE html>
<html>
<head>
<title>Surya Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* bintang */
.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:starsMove 120s linear infinite;
z-index:-3;
}

@keyframes starsMove{
from{background-position:0 0;}
to{background-position:0 2000px;}
}

/* planet */
.planet{
position:fixed;
width:120px;
top:80px;
left:50px;
animation:planetMove 60s linear infinite;
z-index:-2;
}

@keyframes planetMove{
0%{transform:translateX(0);}
50%{transform:translateX(300px);}
100%{transform:translateX(0);}
}

/* galaksi */
.galaxy{
position:fixed;
width:300px;
top:200px;
right:100px;
animation:galaxySpin 80s linear infinite;
opacity:0.6;
z-index:-2;
}

@keyframes galaxySpin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* navbar */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.6);
}

nav h2{
color:#00ffd5;
}

nav ul{
display:flex;
list-style:none;
}

nav ul li{
margin-left:25px;
}

nav ul li a{
color:white;
text-decoration:none;
}

/* hero */
.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* foto profil */
.profile{
width:180px;
height:180px;
border-radius:50%;
border:4px solid #00ffd5;
margin-bottom:20px;
object-fit:cover;

animation:spin 20s linear infinite;

box-shadow:
0 0 10px #00ffd5,
0 0 20px #00ffd5,
0 0 40px #00ffd5,
0 0 80px #00ffd5;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.hero h1{
font-size:60px;
color:#00ffd5;
margin-bottom:20px;
}

/* tombol */
.btn{
padding:12px 25px;
background:#00ffd5;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* karakter anime */
.anime{
position:fixed;
bottom:30px;
right:30px;
width:220px;
transition:0.1s;
}

/* kedip */
.blink{
animation:blink 5s infinite;
}

@keyframes blink{
0%{opacity:1;}
48%{opacity:1;}
50%{opacity:0.3;}
52%{opacity:1;}
100%{opacity:1;}
}

/* section */
.section{
padding:80px;
text-align:center;
background:#111;
}

.section a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}

.section a:hover{
text-decoration:underline;
}

/* tombol musik */

.music-btn{
position:fixed;
bottom:30px;
left:30px;
background:#00ffd5;
color:black;
padding:12px 20px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
box-shadow:0 0 15px #00ffd5;
transition:0.3s;
}

.music-btn:hover{
transform:scale(1.1);
}

/* tombol mode */

.mode-btn{
position:fixed;
top:20px;
right:20px;
background:#222;
color:white;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

/* light mode */

.light-mode{
background:white;
color:black;
}

.light-mode nav{
background:rgba(255,255,255,0.7);
}

/* warna link aplikasi */

.instagram{
color:#E1306C !important;
}

.whatsapp{
color:#25D366 !important;
}

/* RESPONSIVE HP */

@media (max-width:768px){

nav{
flex-direction:column;
align-items:center;
}

nav ul{
margin-top:10px;
}

.hero h1{
font-size:35px;
}

.profile{
width:130px;
height:130px;
}

.section{
padding:40px 20px;
}

.anime{
width:140px;
bottom:10px;
right:10px;
}

.music-btn{
bottom:15px;
left:15px;
padding:10px 15px;
font-size:14px;
}

.mode-btn{
top:10px;
right:10px;
font-size:14px;
}

.planet{
width:80px;
}

.galaxy{
width:180px;
}

}

</style>

</head>

<body>

<script>

/* musik */

let musik = document.getElementById("musik");

function toggleMusic(){

/* dark mode */

function toggleMode(){
document.body.classList.toggle("light-mode");

/* karakter mengikuti mouse */

let anime = document.getElementById("anime");

</html>
