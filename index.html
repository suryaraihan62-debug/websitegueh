<!DOCTYPE html>
<html>
<head>
<title>Surya Website</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* bintang */
.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:starsMove 120s linear infinite;
z-index:-3;
}

@keyframes starsMove{
from{background-position:0 0;}
to{background-position:0 2000px;}
}

/* planet */
.planet{
position:fixed;
width:120px;
top:80px;
left:50px;
animation:planetMove 60s linear infinite;
z-index:-2;
}

@keyframes planetMove{
0%{transform:translateX(0);}
50%{transform:translateX(300px);}
100%{transform:translateX(0);}
}

/* galaksi */
.galaxy{
position:fixed;
width:300px;
top:200px;
right:100px;
animation:galaxySpin 80s linear infinite;
opacity:0.6;
z-index:-2;
}

@keyframes galaxySpin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* navbar */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.6);
}

nav h2{
color:#00ffd5;
}

nav ul{
display:flex;
list-style:none;
}

nav ul li{
margin-left:25px;
}

nav ul li a{
color:white;
text-decoration:none;
}

/* hero */
.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* foto profil */
.profile{
width:180px;
height:180px;
border-radius:50%;
border:4px solid #00ffd5;
margin-bottom:20px;
object-fit:cover;

animation:spin 20s linear infinite;

box-shadow:
0 0 10px #00ffd5,
0 0 20px #00ffd5,
0 0 40px #00ffd5,
0 0 80px #00ffd5;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.hero h1{
font-size:60px;
color:#00ffd5;
margin-bottom:20px;
}

/* tombol */
.btn{
padding:12px 25px;
background:#00ffd5;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* karakter anime */
.anime{
position:fixed;
bottom:30px;
right:30px;
width:220px;
animation:float 4s ease-in-out infinite;
transition:transform 0.1s;
}

/* melayang */
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0);}
}

@keyframes blink{
0%{opacity:1;}
48%{opacity:1;}
50%{opacity:0.3;}
52%{opacity:1;}
100%{opacity:1;}
}

/* section */
.section{
padding:80px;
text-align:center;
background:#111;
}

.section a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}

.section a:hover{
text-decoration:underline;
}

/* tombol musik */

.music-btn{
position:fixed;
bottom:30px;
left:30px;
background:#00ffd5;
color:black;
padding:12px 20px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
box-shadow:0 0 15px #00ffd5;
transition:0.3s;
}

.music-btn:hover{
transform:scale(1.1);
}

/* tombol mode */

.mode-btn{
position:fixed;
top:20px;
right:20px;
background:#222;
color:white;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

/* light mode */

.light-mode{
background:white;
color:black;
}

.light-mode nav{
background:rgba(255,255,255,0.7);
}

/* warna link aplikasi */

.instagram{
color:#ff4fd8;
}

.whatsapp{
color:#25D366;
}

</style>

</head>

<body>

<h2>Surya.dev</h2>

<div class="section">

<h2>Tentang Gua</h2>

<p>Lagi belajar coding sama buat website.</p>

<script>

/* musik */

let musik = document.getElementById("musik");

function toggleMusic(){

if(musik.paused){
musik.play();
}else{
musik.pause();
}

}

/* dark light mode */

function toggleMode(){
document.body.classList.toggle("light-mode");
}

/* teks mengetik */

let text = "Hewloo!! Gua Surya ヾ(^▽^*)))";
let i = 0;

function typing(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typing,100);
}
}

typing();

/* karakter mengikuti mouse */

let anime = document.getElementById("anime");

document.addEventListener("mousemove", function(e){

let x = (e.clientX - window.innerWidth/2) / 40;
let y = (e.clientY - window.innerHeight/2) / 40;

anime.style.transform = `translate(${x}px, ${y}px)`;

});

</script>

</body>
</html>
